<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoir Elissar — The Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tyrian:       #5b1a6e;
    --tyrian-deep:  #3a0a47;
    --tyrian-mid:   #7c2d94;
    --tyrian-soft:  #c9a0d8;
    --tyrian-pale:  #f5eefa;
    --tyrian-wash:  #ede0f5;
    --gold:         #b8860b;
    --gold-light:   #d4aa3a;
    --paper:        #faf5ee;
    --paper-aged:   #f0e6d8;
    --ink:          #1a1209;
    --ink-light:    #5a4a3a;
    --serif:        'Playfair Display', Georgia, serif;
    --body:         'EB Garamond', Georgia, serif;
    --mono:         'Special Elite', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; height: 58px;
    background: var(--tyrian-deep);
    border-bottom: 2px solid var(--gold);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 24px; z-index: 100;
  }

  .header-left { display: flex; align-items: baseline; gap: 10px; }

  .header-eyebrow {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.18em; color: var(--tyrian-soft);
    text-transform: uppercase;
  }

  .header-title {
    font-family: var(--serif); font-size: 22px;
    font-style: italic; color: #f0e6f5;
    letter-spacing: 0.01em;
  }

  .header-subtitle {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.14em; color: var(--gold);
    text-transform: uppercase; margin-left: 4px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    display: flex; align-items: center; gap: 8px;
  }

  .search-box {
    position: relative; display: flex; align-items: center;
  }

  #search {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(201,160,216,0.35);
    color: #f0e6f5;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 32px 7px 12px;
    width: 220px; outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  #search::placeholder { color: rgba(201,160,216,0.4); }
  #search:focus {
    border-color: var(--tyrian-soft);
    background: rgba(255,255,255,0.14);
  }

  .search-clear {
    position: absolute; right: 10px;
    color: var(--tyrian-soft); cursor: pointer;
    font-size: 16px; line-height: 1; opacity: 0.5;
    transition: opacity 0.15s; user-select: none;
  }
  .search-clear:hover { opacity: 1; }

  .node-count {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.1em; color: rgba(201,160,216,0.5);
  }

  /* ── CANVAS ── */
  #graph-canvas {
    position: fixed; top: 58px; left: 0; right: 0; bottom: 0;
    cursor: grab; display: block;
  }
  #graph-canvas:active { cursor: grabbing; }

  /* ── LEGEND ── */
  .legend {
    position: fixed; bottom: 24px; left: 20px;
    background: rgba(250,245,238,0.96);
    border: 1px solid rgba(91,26,110,0.18);
    border-top: 2px solid var(--tyrian);
    padding: 14px 16px; z-index: 50;
    min-width: 168px;
    backdrop-filter: blur(4px);
  }

  .legend-title {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.18em; color: var(--tyrian);
    text-transform: uppercase; margin-bottom: 10px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .legend-item:hover { opacity: 0.65; }
  .legend-item.hidden { opacity: 0.3; }

  .legend-dot {
    width: 11px; height: 11px;
    border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid rgba(0,0,0,0.2);
  }

  .legend-label {
    font-family: var(--body); font-size: 13px;
    color: var(--ink);
  }

  /* ── DETAIL PANEL ── */
  .detail {
    position: fixed; top: 74px; right: 20px;
    width: 280px;
    background: var(--paper);
    border: 1px solid rgba(91,26,110,0.2);
    border-top: 3px solid var(--tyrian);
    padding: 18px 20px 20px;
    z-index: 50;
    transform: translateX(310px);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  }

  .detail.open { transform: translateX(0); }

  .detail-close {
    position: absolute; top: 14px; right: 14px;
    cursor: pointer; color: var(--tyrian-soft);
    font-size: 20px; line-height: 1;
    transition: color 0.15s;
  }
  .detail-close:hover { color: var(--tyrian); }

  .detail-cat {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.18em; color: var(--tyrian-mid);
    text-transform: uppercase; margin-bottom: 6px;
  }

  .detail-name {
    font-family: var(--serif); font-size: 22px;
    font-weight: 700; color: var(--tyrian-deep);
    line-height: 1.15; margin-bottom: 10px;
    padding-right: 20px;
  }

  .detail-desc {
    font-family: var(--body); font-size: 14px;
    font-style: italic; color: var(--ink-light);
    line-height: 1.65; margin-bottom: 14px;
    border-left: 2px solid var(--tyrian-soft);
    padding-left: 10px;
  }

  .detail-connections { border-top: 1px solid rgba(91,26,110,0.12); padding-top: 12px; }

  .detail-conn-title {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.14em; color: var(--ink-light);
    text-transform: uppercase; margin-bottom: 8px;
  }

  .detail-conn-list { display: flex; flex-wrap: wrap; gap: 5px; }

  .conn-pill {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.06em; padding: 4px 8px;
    background: var(--tyrian-pale);
    color: var(--tyrian);
    border: 1px solid rgba(91,26,110,0.22);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .conn-pill:hover { background: var(--tyrian-soft); color: var(--tyrian-deep); }

  /* ── ZOOM CONTROLS ── */
  .controls {
    position: fixed; bottom: 24px; right: 20px;
    display: flex; flex-direction: column; gap: 4px; z-index: 50;
  }

  .ctrl-btn {
    width: 34px; height: 34px;
    background: var(--tyrian-deep); color: #f0e6f5;
    border: 1px solid rgba(201,160,216,0.2);
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--tyrian-mid); }

  /* ── INSTRUCTIONS ── */
  .instructions {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.1em; color: rgba(91,26,110,0.4);
    text-transform: uppercase; pointer-events: none; z-index: 10;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="header-eyebrow">Memoir</span>
    <span class="header-title">Elissar</span>
    <span class="header-subtitle">· The Levant Knowledge Graph</span>
  </div>
  <div class="search-wrap">
    <span class="node-count" id="node-count"></span>
    <div class="search-box">
      <input id="search" type="text" placeholder="Search the Levant...">
      <span class="search-clear" onclick="clearSearch()">×</span>
    </div>
  </div>
</div>

<!-- CANVAS -->
<canvas id="graph-canvas"></canvas>

<!-- LEGEND -->
<div class="legend" id="legend">

</div>

<!-- DETAIL PANEL -->
<div class="detail" id="detail">
  <div class="detail-close" onclick="closeDetail()">×</div>
  <div class="detail-cat" id="d-cat"></div>
  <div class="detail-name" id="d-name"></div>
  <div class="detail-desc" id="d-desc"></div>
  <div class="detail-connections">
    <div class="detail-conn-title">Connected to</div>
    <div class="detail-conn-list" id="d-conns"></div>
  </div>
</div>

<!-- ZOOM CONTROLS -->
<div class="controls">
  <button class="ctrl-btn" onclick="zoom(1.2)" title="Zoom in">+</button>
  <button class="ctrl-btn" onclick="zoom(0.83)" title="Zoom out">−</button>
  <button class="ctrl-btn" onclick="resetView()" title="Reset" style="font-size:12px">↺</button>
</div>

<div class="instructions">Click a node to explore · Drag to pan · Scroll to zoom · Click legend to filter</div>

// ═══════════════════════════════════════════════
//  GRAPH ENGINE
// ═══════════════════════════════════════════════

const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
let W, H;
let transform = { x: 0, y: 0, scale: 1 };
let dragging = false, dragNode = null, lastMouse = { x: 0, y: 0 };
let selectedNode = null, highlightSet = null, searchQuery = '';
let hiddenCats = new Set();
let simSteps = 0;
const MAX_SIM = 400;

// Build node map and adjacency list
const nodeMap = {};
NODES.forEach(n => {
  nodeMap[n.id] = n;
  n.x = 0; n.y = 0; n.vx = 0; n.vy = 0;
});

const adj = {};
NODES.forEach(n => adj[n.id] = []);
EDGES.forEach(([a, b]) => {
  if (nodeMap[a] && nodeMap[b]) {
    if (!adj[a].includes(b)) adj[a].push(b);
    if (!adj[b].includes(a)) adj[b].push(a);
  }
});

// Degree for sizing hints
NODES.forEach(n => {
  n.degree = adj[n.id].length;
});

function resize() {
  W = window.innerWidth;
  H = window.innerHeight - 58;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function initPositions() {
  const cx = W / 2, cy = H / 2;
  // Sort by degree descending — busiest nodes near center
  const sorted = [...NODES].sort((a, b) => b.degree - a.degree);
  sorted.forEach((n, i) => {
    const angle = (i / NODES.length) * 2 * Math.PI + Math.random() * 0.3;
    const tier = Math.floor(i / 8);
    const r = 80 + tier * 120 + Math.random() * 60;
    n.x = cx + r * Math.cos(angle);
    n.y = cy + r * Math.sin(angle);
    n.vx = 0; n.vy = 0;
  });
  // Anchor the biggest hubs
  nodeMap['levant'].x = cx;      nodeMap['levant'].y = cy;
  nodeMap['mediterranean_sea'].x = cx - 200; nodeMap['mediterranean_sea'].y = cy - 100;
  nodeMap['damascus'].x = cx + 160; nodeMap['damascus'].y = cy - 60;
  nodeMap['phoenicia'].x = cx - 120; nodeMap['phoenicia'].y = cy + 100;
  nodeMap['elissar'].x = cx - 55;  nodeMap['elissar'].y = cy - 50;
  nodeMap['jerusalem'].x = cx + 80; nodeMap['jerusalem'].y = cy + 130;
  nodeMap['silk_road'].x = cx + 200; nodeMap['silk_road'].y = cy + 80;
}

// Force-directed simulation
const REPEL = 4000, ATTRACT = 0.022, CENTER_F = 0.006, DAMPING = 0.80, REST_LEN = 95;

function simulate() {
  NODES.forEach(n => {
    let fx = 0, fy = 0;
    // Gravity toward center
    fx += (W / 2 - n.x) * CENTER_F;
    fy += (H / 2 - n.y) * CENTER_F;
    // Repulsion between all nodes
    NODES.forEach(m => {
      if (m === n) return;
      const dx = n.x - m.x, dy = n.y - m.y;
      const d2 = dx * dx + dy * dy + 1;
      const d = Math.sqrt(d2);
      const f = REPEL / d2;
      fx += (dx / d) * f;
      fy += (dy / d) * f;
    });
    // Spring attraction along edges
    adj[n.id].forEach(mid => {
      const m = nodeMap[mid];
      if (!m) return;
      const dx = m.x - n.x, dy = m.y - n.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const f = (d - REST_LEN) * ATTRACT;
      fx += (dx / d) * f;
      fy += (dy / d) * f;
    });
    n.vx = (n.vx + fx) * DAMPING;
    n.vy = (n.vy + fy) * DAMPING;
  });
  NODES.forEach(n => {
    if (n === dragNode) return;
    n.x += n.vx;
    n.y += n.vy;
    // Soft boundary
    const pad = 40;
    if (n.x < pad) { n.x = pad; n.vx *= -0.5; }
    if (n.y < pad) { n.y = pad; n.vy *= -0.5; }
    if (n.x > W - pad) { n.x = W - pad; n.vx *= -0.5; }
    if (n.y > H - pad) { n.y = H - pad; n.vy *= -0.5; }
  });
}

// Convert world coords to screen coords
function worldToScreen(wx, wy) {
  return {
    x: wx * transform.scale + transform.x,
    y: wy * transform.scale + transform.y,
  };
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // ── EDGES (in world space) ──
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.scale, transform.scale);

  EDGES.forEach(([aid, bid]) => {
    const a = nodeMap[aid], b = nodeMap[bid];
    if (!a || !b) return;
    if (hiddenCats.has(a.cat) || hiddenCats.has(b.cat)) return;

    let alpha = 0.14;
    if (highlightSet) {
      alpha = (highlightSet.has(aid) && highlightSet.has(bid)) ? 0.65 : 0.03;
    }
    if (searchQuery) {
      const am = a.label.toLowerCase().includes(searchQuery);
      const bm = b.label.toLowerCase().includes(searchQuery);
      alpha = (am || bm) ? 0.55 : 0.03;
    }

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(15,110,86,${alpha})`;
    ctx.lineWidth = 1 / transform.scale;
    ctx.stroke();
  });

  // ── NODE CIRCLES (in world space) ──
  NODES.forEach(n => {
    if (hiddenCats.has(n.cat)) return;
    const cat = CATEGORIES[n.cat] || CATEGORIES.event;
    let nodeAlpha = 1;
    if (highlightSet && !highlightSet.has(n.id)) nodeAlpha = 0.12;
    if (searchQuery && !n.label.toLowerCase().includes(searchQuery)) nodeAlpha = 0.1;

    ctx.globalAlpha = nodeAlpha;

    // Gold selection ring
    if (selectedNode && selectedNode.id === n.id) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size + 7, 0, Math.PI * 2);
      ctx.strokeStyle = '#b8860b';
      ctx.lineWidth = 2.5 / transform.scale;
      ctx.stroke();
    }

    // Circle fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
    ctx.fillStyle = cat.color;
    ctx.fill();
    ctx.strokeStyle = cat.border;
    ctx.lineWidth = 1.5 / transform.scale;
    ctx.stroke();

    ctx.globalAlpha = 1;
  });

  ctx.restore();

  // ── LABELS (in screen space — always readable) ──
  NODES.forEach(n => {
    if (hiddenCats.has(n.cat)) return;

    const showLabel = true;

    if (!showLabel) return;

    let nodeAlpha = 1;
    if (highlightSet && !highlightSet.has(n.id)) nodeAlpha = 0.12;
    if (searchQuery && !n.label.toLowerCase().includes(searchQuery)) nodeAlpha = 0.1;

    const sc = worldToScreen(n.x, n.y);
    // Don't draw label if node is off-screen
    if (sc.x < -60 || sc.x > W + 60 || sc.y < -20 || sc.y > H + 20) return;

    const scaledRadius = n.size * transform.scale;
    const fontSize = Math.max(10, Math.min(13, n.size * 0.82));

    ctx.globalAlpha = nodeAlpha;
    ctx.font = `${fontSize}px 'Special Elite', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Subtle text shadow for readability on any background
    ctx.shadowColor = 'rgba(26,18,9,0.85)';
    ctx.shadowBlur = 3;
    ctx.fillStyle = '#f5eefa';
    ctx.fillText(n.label, sc.x, sc.y + scaledRadius + 3);

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });
}

function tick() {
  if (simSteps < MAX_SIM) { simulate(); simSteps++; }
  draw();
  requestAnimationFrame(tick);
}

// ── INTERACTION ──

function canvasPoint(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left - transform.x) / transform.scale,
    y: (clientY - rect.top  - transform.y) / transform.scale,
  };
}

function nodeAt(clientX, clientY) {
  const { x, y } = canvasPoint(clientX, clientY);
  for (let i = NODES.length - 1; i >= 0; i--) {
    const n = NODES[i];
    if (hiddenCats.has(n.cat)) continue;
    const dx = x - n.x, dy = y - n.y;
    if (dx * dx + dy * dy <= (n.size + 8) * (n.size + 8)) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const node = nodeAt(e.clientX, e.clientY);
  if (node) { dragNode = node; }
  else { dragging = true; }
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
  if (dragNode) {
    dragNode.x += dx / transform.scale;
    dragNode.y += dy / transform.scale;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (dragging) {
    transform.x += dx; transform.y += dy;
  }
  lastMouse = { x: e.clientX, y: e.clientY };
  const hovered = nodeAt(e.clientX, e.clientY);
  canvas.style.cursor = hovered ? 'pointer' : (dragging ? 'grabbing' : 'grab');
});

canvas.addEventListener('mouseup', e => {
  if (!dragging && !dragNode) {
    const node = nodeAt(e.clientX, e.clientY);
    if (node) selectNode(node);
    else { closeDetail(); highlightSet = null; selectedNode = null; }
  }
  dragging = false; dragNode = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const f = e.deltaY < 0 ? 1.1 : 0.91;
  transform.x = cx - (cx - transform.x) * f;
  transform.y = cy - (cy - transform.y) * f;
  transform.scale = Math.max(0.12, Math.min(5, transform.scale * f));
}, { passive: false });

// Touch
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const node = nodeAt(t.clientX, t.clientY);
    if (node) dragNode = node; else dragging = true;
    lastMouse = { x: t.clientX, y: t.clientY };
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const dx = t.clientX - lastMouse.x, dy = t.clientY - lastMouse.y;
    if (dragNode) { dragNode.x += dx / transform.scale; dragNode.y += dy / transform.scale; dragNode.vx = 0; dragNode.vy = 0; }
    else if (dragging) { transform.x += dx; transform.y += dy; }
    lastMouse = { x: t.clientX, y: t.clientY };
  }
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (!dragging && !dragNode && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    const node = nodeAt(t.clientX, t.clientY);
    if (node) selectNode(node); else { closeDetail(); highlightSet = null; selectedNode = null; }
  }
  dragging = false; dragNode = null;
}, { passive: true });

// ── SELECT NODE ──

function selectNode(node) {
  selectedNode = node;
  highlightSet = new Set([node.id, ...adj[node.id]]);
  simSteps = 0;

  const cat = CATEGORIES[node.cat] || { label: node.cat };
  document.getElementById('d-cat').textContent = cat.label;
  document.getElementById('d-name').textContent = node.label;
  document.getElementById('d-desc').textContent = node.desc || '';

  const conns = document.getElementById('d-conns');
  conns.innerHTML = '';
  adj[node.id]
    .map(id => nodeMap[id])
    .filter(Boolean)
    .sort((a, b) => a.label.localeCompare(b.label))
    .forEach(nb => {
      const pill = document.createElement('div');
      pill.className = 'conn-pill';
      pill.textContent = nb.label;
      pill.onclick = () => selectNode(nb);
      conns.appendChild(pill);
    });

  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  selectedNode = null; highlightSet = null;
}

// ── SEARCH ──

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  highlightSet = null; selectedNode = null;
  closeDetail();
  if (searchQuery) {
    const matches = NODES.filter(n => n.label.toLowerCase().includes(searchQuery));
    if (matches.length === 1) selectNode(matches[0]);
  }
});

function clearSearch() {
  document.getElementById('search').value = '';
  searchQuery = '';
  highlightSet = null;
  closeDetail();
}

// ── LEGEND ──

function buildLegend() {
  const legend = document.getElementById('legend');
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.cat = key;
    item.innerHTML = `<div class="legend-dot" style="background:${cat.color};border-color:${cat.border}"></div><span class="legend-label">${cat.label}</span>`;
    item.addEventListener('click', () => {
      if (hiddenCats.has(key)) hiddenCats.delete(key);
      else hiddenCats.add(key);
      item.classList.toggle('hidden', hiddenCats.has(key));
    });
    legend.appendChild(item);
  });
}

// ── ZOOM / RESET ──

function zoom(f) {
  transform.x = W / 2 - (W / 2 - transform.x) * f;
  transform.y = H / 2 - (H / 2 - transform.y) * f;
  transform.scale = Math.max(0.12, Math.min(5, transform.scale * f));
}

function resetView() {
  transform = { x: 0, y: 0, scale: 1 };
  simSteps = 0;
  initPositions();
}

// ── NODE COUNT ──
document.getElementById('node-count').textContent =
  `${NODES.length} nodes · ${EDGES.length} edges ·`;

// ── INIT ──
window.addEventListener('resize', () => { resize(); });
resize();
buildLegend();
initPositions();
tick();
</script>
